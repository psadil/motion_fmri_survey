project:
  type: manuscript
  render:
    - "index.qmd"

# Author and affiliation metadata lives only in _authors.yml, which is also
# what R/make_author_tsv.R reads to build the bioRxiv submission sheet.
# Do not add an `author:` block to index.qmd -- document metadata overrides
# metadata-files, so it would silently win.
metadata-files:
  - _authors.yml

lang: en


