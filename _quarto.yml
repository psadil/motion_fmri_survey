    # journal:
    #   name: bioRxiv
    #   formatting: preprint
    #   model: 1p
    #   cite-style: authoryear
    # keep-tex: true
    # latex-max-runs: 20
  apaquarto-pdf:
    # Can be jou (journal), man (manuscript), stu (student), or doc (document)
    documentmode: man
    include-in-header:
    - text: |
        % apaquarto emits no \hypersetup block, so PDF catalog entries that
        % viewers and screen readers use must be set explicitly here.
        % hyperref is already loaded by this point.
        \hypersetup{pdflang={en},pdfdisplaydoctitle=true}
        \usepackage[section]{placeins}
        \usepackage{tikz}
        \usepackage{pdflscape}
        \usepackage{caption}
        \usepackage{subcaption}
        \usepackage{siunitx}
        \usepackage{fontspec}
        \usepackage{authblk}
        \usepackage{cleveref}
        \usepackage{tabularx}
        \usepackage{tabularray}
        \usepackage[smartEllipses]{markdown}
        \newcommand{\tabitem}{~~\llap{\textbullet}~~}
        \def\DJ{{\fontencoding{T1}\selectfont\char208}}
        % Shrink long (page-breaking) tables. \begin{longtable} resets the font,
        % so the size must be applied via a hook that fires after its setup.
        % The hook is gated on a switch so it only affects the tables we opt in
        % (the wide model-fit tables); markdown tables elsewhere, such as
        % tbl-overview, are also longtables and must render at normal size.
        % Opt in per table with \renewcommand{\apatablesize}{\tiny} and reset
        % it to empty afterwards.
        \usepackage{etoolbox}
        \newcommand{\apatablesize}{}
        \AtBeginEnvironment{longtable}{\apatablesize}
