project:
  type: manuscript
  render: 
    - "index.qmd"


format:
  pdf:
    documentclass: imag-ms-template
    include-in-header:
      - text: |
          \usepackage[section]{placeins}
          \usepackage{tikz}
          \usepackage{pdflscape}
          \usepackage{caption}
          \usepackage{subcaption}
          \usepackage{siunitx}
          \usepackage{fontspec}
          \usepackage{authblk}
          \usepackage{cleveref}
          \usepackage{tabularx}
          \usepackage{tabularray}
          \usepackage[smartEllipses]{markdown}
          \newcommand{\tabitem}{~~\llap{\textbullet}~~}
          \def\DJ{{\fontencoding{T1}\selectfont\char208}}
    journal:
      name: bioRxiv
      formatting: preprint
      model: 1p
      cite-style: authoryear
    keep-tex: true
    latex-max-runs: 20