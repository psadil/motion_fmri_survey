#   - the manuscript, via `metadata-files` in _quarto.yml
#   - the bioRxiv submission sheet, via `Rscript R/make_author_tsv.R`
#
# Edit authors here and nowhere else. After editing, regenerate the bioRxiv
# sheet so the two stay in sync.
#
# Note: affiliation names are rendered by LaTeX, so `&` must be written `\&`.
# The TSV script unescapes this automatically.

